name: Package Compatibility

on:
  push:
    branches:
      - main
      - ci
    paths:
      - "**/*.py"
      - "pyproject.toml"
      - "setup.py"
      - "setup.cfg"
      - "MANIFEST.in"
      - ".github/workflows/**"
  pull_request:
    branches:
      - main
    paths:
      - "**/*.py"
      - "pyproject.toml"
      - "setup.py"
      - "setup.cfg"
      - "MANIFEST.in"
      - ".github/workflows/**"

jobs:
  build:
    name: Build and Install on Python ${{ matrix.python-version }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"

    steps:
      - uses: actions/checkout@v6
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          architecture: "x64"
      - name: Install build tools
        run: |
          python -m pip install --upgrade pip build
      - name: Build package
        run: |
          rm -rf build dist
          python -m build
      - name: Install built wheel
        run: |
          python -m pip install --force-reinstall "$(ls -t dist/*.whl | head -n 1)"
      - name: Verify installed dependencies
        run: |
          python -m pip check
      - name: Smoke test import
        run: |
          python -c "import wifi_heat_mapper.main as main; print(main.__file__)"
