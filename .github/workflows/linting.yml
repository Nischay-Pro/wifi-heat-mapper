name: Linting

on:
  push:
    branches:
      - main
      - ci
    paths:
      - "**/*.py"
  pull_request:
    branches:
      - main
    paths:
      - "**/*.py"

jobs:
  lint:
    name: Python Linting
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          architecture: 'x64'
      - name: Install Python packages
        run: |
          pip install --upgrade pip ruff
      - name: Run Python Lint Test
        run: ./.github/workflows/run-linting.sh
